name: debate-agents

x-backend-common: &backend-common
  build:
    context: ./debate
    dockerfile: Dockerfile
  env_file:
    - ./debate/.env
  environment:
    REDIS_HOSTNAME: redis
    REDIS_PORT: 6379
    REDIS_CACHE_HOSTNAME: redis
    REDIS_CACHE_PORT: 6379
    REDIS_EVENTS_HOSTNAME: redis
    REDIS_EVENTS_PORT: 6379
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/0
    SQLITE_DATABASE_PATH: /app/data/debate.db
    WAIT_FOR_REDIS: "1"
    WAIT_FOR_REDIS_TIMEOUT_SECONDS: "90"
    PYTHONUNBUFFERED: "1"
  depends_on:
    redis:
      condition: service_healthy
  volumes:
    - sqlite_data:/app/data
    - celery_beat_state:/app/.celerybeat
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  backend:
    <<: *backend-common
    command: ["uv", "run", "--no-sync", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(3); rc=s.connect_ex(('127.0.0.1',8000)); s.close(); sys.exit(0 if rc==0 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  celery-worker:
    <<: *backend-common
    command: ["uv", "run", "--no-sync", "celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=info"]

  celery-beat:
    <<: *backend-common
    command: ["uv", "run", "--no-sync", "celery", "-A", "app.celery_app:celery_app", "beat", "--loglevel=info", "--schedule=/app/.celerybeat/celerybeat-schedule"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_DEBATE_API_BASE_URL: ${NEXT_PUBLIC_DEBATE_API_BASE_URL:-http://localhost:8000}
    env_file:
      - ./frontend/.env.local
    environment:
      NODE_ENV: production
      CHOKIDAR_USEPOLLING: "false"
      WATCHPACK_POLLING: "false"
    command: ["npm", "run", "start", "--", "-H", "0.0.0.0", "-p", "3000"]
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
  celery_beat_state:
  redis_data:
