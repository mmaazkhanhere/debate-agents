services:
  frontend:
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_DEBATE_API_BASE_URL: ${NEXT_PUBLIC_DEBATE_API_BASE_URL:?Set NEXT_PUBLIC_DEBATE_API_BASE_URL in .env}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

  frontend-prod:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_DEBATE_API_BASE_URL: ${NEXT_PUBLIC_DEBATE_API_BASE_URL:?Set NEXT_PUBLIC_DEBATE_API_BASE_URL in .env}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_DEBATE_API_BASE_URL: ${NEXT_PUBLIC_DEBATE_API_BASE_URL:?Set NEXT_PUBLIC_DEBATE_API_BASE_URL in .env}
    ports:
      - "3000:3000"
    profiles:
      - prod

volumes:
  frontend_node_modules:
  frontend_next: